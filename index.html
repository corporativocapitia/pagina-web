<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capitia — Próximamente</title>
<meta name="description" content="Estamos preparando algo nuevo para Capitia.">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
:root{
  --sage:#3D5A55;
  --paper:#F5F6F4;
  --accent:#083933;
  --accent-warm:#0a4a42;
  --txt:#15162C;
  --txt-dim:rgba(21,22,44,0.78);
  --txt-faint:rgba(21,22,44,0.58);
  --border:rgba(8,57,51,0.16);
  --border-strong:rgba(8,57,51,0.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  font-feature-settings:'cv11','ss01','ss03';
  -webkit-font-smoothing:antialiased;
  background:var(--paper);
  color:var(--txt);
  line-height:1.55;
  display:flex;flex-direction:column;
  position:relative;
  overflow-x:hidden;
}

/* === Background con profundidad rica (no plano) === */
body{
  background:
    radial-gradient(800px 600px at 92% -8%,rgba(61,90,85,0.34),transparent 60%),
    radial-gradient(700px 500px at -8% 108%,rgba(8,57,51,0.26),transparent 65%),
    radial-gradient(900px 500px at 50% 40%,rgba(255,255,255,0.55),transparent 78%),
    linear-gradient(165deg,#EDEFE9 0%,#F5F6F4 42%,#E5EAE5 100%);
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(8,57,51,0.07) 1px,transparent 1px),
    linear-gradient(to right,rgba(8,57,51,0.07) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 80% 70% at center,black 20%,transparent 78%);
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at center,black 20%,transparent 78%);
}
body::after{
  content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.06;
  mix-blend-mode:multiply;
}
.blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;opacity:0.55}
.blob.b1{width:560px;height:560px;background:radial-gradient(circle,rgba(61,90,85,0.50),transparent 70%);top:-180px;right:-140px;animation:driftA 32s ease-in-out infinite}
.blob.b2{width:480px;height:480px;background:radial-gradient(circle,rgba(8,57,51,0.32),transparent 70%);bottom:-160px;left:-120px;animation:driftB 38s ease-in-out infinite}
@keyframes driftA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,90px) scale(1.1)}}
@keyframes driftB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(90px,-70px) scale(0.95)}}

/* === Layout === */
.topbar{position:relative;z-index:2;padding:28px 40px;display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;opacity:0;animation:fade .7s .15s forwards}
.brand .iso{width:34px;height:34px;background:url(/favicon.png) center/contain no-repeat}
.brand .word{font-size:18px;font-weight:700;letter-spacing:-0.02em;color:var(--accent)}
.topbar .access{font-size:13px;color:var(--sage);text-decoration:none;font-weight:500;padding:9px 18px;border-radius:999px;border:1px solid var(--border);transition:all .22s;opacity:0;animation:fade .7s .3s forwards}
.topbar .access:hover{color:var(--accent);background:rgba(255,255,255,0.5);border-color:var(--border-strong)}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;position:relative;z-index:2}
.card{width:100%;max-width:640px;text-align:center;opacity:0;transform:translateY(20px);animation:cardIn .9s .35s cubic-bezier(.16,1,.3,1) forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
@keyframes fade{to{opacity:1}}

.kicker{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--sage);font-weight:600;padding:8px 16px;background:linear-gradient(135deg,rgba(61,90,85,0.10),rgba(8,57,51,0.06));border:1px solid rgba(61,90,85,0.22);border-radius:999px;margin-bottom:30px}
.kicker .dot{width:6px;height:6px;border-radius:50%;background:var(--sage);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(1.3)}}

h1{font-size:clamp(40px,6vw,72px);font-weight:600;letter-spacing:-0.035em;line-height:1.05;color:var(--accent);margin-bottom:20px}
h1 .g{background:linear-gradient(135deg,var(--accent) 0%,var(--sage) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:17px;color:var(--txt-dim);max-width:480px;margin:0 auto 36px;line-height:1.55}

.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.cta{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:12px;font-size:14.5px;font-weight:500;text-decoration:none;transition:all .25s cubic-bezier(.16,1,.3,1);cursor:pointer}
.cta-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(8,57,51,0.20)}
.cta-primary:hover{background:var(--accent-warm);transform:translateY(-2px);box-shadow:0 10px 30px rgba(8,57,51,0.30)}
.cta-primary .arrow{transition:transform .25s}
.cta-primary:hover .arrow{transform:translateX(4px)}
.cta-ghost{background:transparent;color:var(--accent);border:1px solid var(--border-strong)}
.cta-ghost:hover{background:rgba(255,255,255,0.45);border-color:var(--accent)}

.footer{position:relative;z-index:2;padding:24px;text-align:center;font-size:12px;color:var(--txt-faint);letter-spacing:.04em;opacity:0;animation:fade .7s .8s forwards}
.footer .sep{color:var(--sage);margin:0 8px}

@media(max-width:600px){
  .topbar{padding:20px 22px}
  .card{padding:0 8px}
  h1{font-size:36px}
}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<header class="topbar">
  <a href="/" class="brand" aria-label="Capitia">
    <span class="iso"></span>
  </a>
</header>

<main>
  <div class="card">
    <span class="kicker">Próximamente</span>
    <h1>Estamos construyendo<br><span class="g">algo nuevo.</span></h1>
    <p class="sub">Trabajamos en una versión renovada de Capitia.</p>
    <div class="cta-row">
      <a href="/login" class="cta cta-primary">Iniciar sesión <span class="arrow">→</span></a>
    </div>
  </div>
</main>

<div class="footer">
  © Capitia <span class="sep">·</span> Certeza.
</div>

</body>
</html>
