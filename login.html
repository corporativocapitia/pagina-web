<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Capitia</title>
<style>
:root{
  --sage:#4D6E69;
  --bg:#FFFFFF;
  --bg-tint:#FAFBFA;
  --accent:#083933;
  --txt:#1a1a1a;
  --txt-faint:#666;
  --border:rgba(8,57,51,0.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  background:var(--bg-tint);
  color:var(--txt);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}
.topbar{
  padding:24px 32px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar a.brand{
  font-size:22px;font-weight:600;letter-spacing:-0.02em;
  color:var(--accent);text-decoration:none;
}
.topbar a.back{
  font-size:13px;color:var(--sage);text-decoration:none;
}
.topbar a.back:hover{color:var(--accent)}
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}
.card{
  width:100%;max-width:460px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:48px 40px;
  text-align:center;
  box-shadow:0 1px 2px rgba(8,57,51,0.04), 0 8px 32px rgba(8,57,51,0.06);
}
.badge{
  display:inline-block;
  font-size:11px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--sage);
  padding:5px 12px;
  background:rgba(77,110,105,0.08);
  border-radius:999px;
  margin-bottom:24px;
}
h1{
  font-size:32px;font-weight:600;letter-spacing:-0.02em;
  color:var(--accent);
  margin-bottom:14px;
}
p.sub{
  font-size:15px;color:var(--txt-faint);
  max-width:340px;margin:0 auto 28px;
}
.cta{
  display:inline-block;
  background:var(--accent);color:#fff;
  font-size:14px;font-weight:500;
  padding:12px 26px;border-radius:10px;
  text-decoration:none;
  transition:background .15s;
}
.cta:hover{background:#0a4a42}
.footer{
  text-align:center;padding:18px;
  font-size:12px;color:var(--txt-faint);
}
@media(max-width:520px){
  .card{padding:36px 24px}
  h1{font-size:26px}
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="brand">capitia.</a>
  <a href="/" class="back">← Volver al inicio</a>
</header>

<main>
  <div class="card">
    <span class="badge">Próximamente</span>
    <h1>Tu acceso unificado</h1>
    <p class="sub">Estamos preparando un único inicio de sesión para todos tus dashboards de CapitIA. Por ahora, entra desde el enlace que tu administrador te compartió.</p>
    <a href="/" class="cta">Volver al inicio</a>
  </div>
</main>

<div class="footer">
  © Capitia · Certeza.
</div>

</body>
</html>
