  --sage:#4D6E69;
  --bg:#FFFFFF;
  --bg-alt:#FFFFFF;
  --bg-tint:#FAFBFA;
  --accent:#083933;
  --txt:#1a1a1a;
  --txt-faint:#666;
  --border:rgba(8,57,51,0.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Campora',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg-tint);
  color:var(--txt);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
  overflow-x:hidden;
}
/* sutil glow sage de fondo */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(60vmax 50vmax at 110% -10%, rgba(77,110,105,0.10), transparent 60%),
             radial-gradient(50vmax 40vmax at -10% 110%, rgba(8,57,51,0.06), transparent 60%);
}
.topbar{
  position:relative;z-index:1;
  padding:20px 32px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar .logo{
  width:118px;height:32px;
  background-image:var(--logo);
  background-repeat:no-repeat;
  background-position:left center;
  background-size:contain;
  display:inline-block;
  text-indent:-9999px;
  overflow:hidden;
}
.topbar a.back{
  font-size:13px;color:var(--sage);text-decoration:none;
  letter-spacing:0.01em;
}
.topbar a.back:hover{color:var(--accent)}
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 24px;position:relative;z-index:1;
}
.card{
  width:100%;max-width:480px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  padding:52px 44px;
  text-align:center;
  box-shadow:0 1px 2px rgba(8,57,51,0.04), 0 20px 60px rgba(8,57,51,0.08);
}
.badge{
  display:inline-block;
  font-family:'Campora',-apple-system,system-ui,sans-serif;
  font-size:11px;letter-spacing:0.22em;text-transform:uppercase;font-weight:500;
  color:var(--sage);
  padding:6px 14px;
  background:rgba(77,110,105,0.08);
  border-radius:999px;
  margin-bottom:28px;
}
h1{
  font-family:'Campora',-apple-system,system-ui,sans-serif;
  font-size:34px;font-weight:600;letter-spacing:-0.025em;
  color:var(--accent);
  margin-bottom:14px;
  line-height:1.15;
}
p.sub{
  font-size:15px;color:var(--txt-faint);
  max-width:360px;margin:0 auto 32px;
  line-height:1.55;
}
.cta{
  display:inline-block;
  background:var(--accent);color:#fff;
  font-family:'Campora',-apple-system,system-ui,sans-serif;
  font-size:14px;font-weight:500;letter-spacing:0.01em;
  padding:13px 28px;border-radius:10px;
  text-decoration:none;
  transition:background .15s, transform .15s;
}
.cta:hover{background:#0a4a42;transform:translateY(-1px)}
.footer{
  position:relative;z-index:1;
  text-align:center;padding:20px;
  font-size:12px;color:var(--txt-faint);
  letter-spacing:0.02em;
}
.footer span{color:var(--sage)}
@media(max-width:520px){
  .topbar{padding:16px 20px}
  .topbar .logo{width:100px;height:28px}
  .card{padding:40px 26px}
  h1{font-size:28px}
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="logo">Capitia</a>
  <a href="/" class="back">← Volver al inicio</a>
</header>

<main>
  <div class="card">
    <span class="badge">Próximamente</span>
    <h1>Tu acceso unificado</h1>
    <p class="sub">Estamos preparando un único inicio de sesión para todos tus dashboards de CapitIA. Por ahora, entra desde el enlace que tu administrador te compartió.</p>
    <a href="/" class="cta">Volver al inicio</a>
  </div>
</main>

<div class="footer">
  © Capitia · <span>Certeza.</span>
</div>

</body>
</html>
