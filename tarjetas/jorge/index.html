:root{
  --night:#15162C;
  --petrol:#0F222A;
  --deep:#083933;
  --sage:#4D6E69;
  --fog:#E0EAE6;
  --bg:#15162C;
  --txt:#E0EAE6;
  --txt-dim:rgba(224,234,230,0.66);
  --txt-faint:rgba(224,234,230,0.42);
  --line:rgba(224,234,230,0.12);
  --line-strong:rgba(224,234,230,0.22);
  --accent:#a8c6c0;
  --wa:#25D366;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{
  font-family:'Campora',-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  display:flex;justify-content:center;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
::selection{background:var(--fog);color:var(--night);}

.atmosphere{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.atmosphere .orb{position:absolute;border-radius:50%;filter:blur(90px);}
.atmosphere .orb-1{width:520px;height:520px;background:var(--deep);opacity:.55;top:-160px;right:-120px;}
.atmosphere .orb-2{width:420px;height:420px;background:var(--sage);opacity:.18;bottom:-140px;left:-100px;}

.card{
  position:relative;z-index:1;width:100%;max-width:440px;
  display:flex;flex-direction:column;
  padding:36px 28px 48px;
  min-height:100vh;
}

/* HEADER (logo) */
.head{display:flex;justify-content:center;margin-bottom:36px;}
.head .iso{width:48px;height:auto;opacity:.95;}
.head .iso img{width:100%;display:block;filter:brightness(0) invert(1);opacity:.9;}

/* IDENTITY */
.identity{text-align:center;margin-bottom:32px;}
.identity .avatar{
  width:104px;height:104px;border-radius:50%;
  margin:0 auto 22px;
  background:linear-gradient(135deg,var(--deep),var(--sage));
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:200;color:var(--fog);letter-spacing:-0.02em;
  box-shadow:0 18px 50px -16px rgba(8,57,51,.5);
  border:1px solid rgba(224,234,230,.10);
}
.identity .name{
  font-size:32px;font-weight:200;letter-spacing:-0.02em;line-height:1.1;
  color:var(--txt);margin-bottom:8px;
}
.identity .role{font-size:14.5px;font-weight:300;color:var(--txt-dim);line-height:1.4;}
.identity .role .sep{color:var(--txt-faint);margin:0 6px;}
.identity .co{color:var(--accent);}

/* SAVE BUTTON */
.save{
  background:var(--fog);color:var(--night);
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:17px 24px;border-radius:48px;
  font-family:inherit;font-size:15px;font-weight:400;letter-spacing:.01em;
  text-decoration:none;cursor:pointer;border:none;width:100%;
  transition:transform .25s,box-shadow .25s;
  box-shadow:0 14px 36px -14px rgba(224,234,230,.30);
  margin-bottom:26px;
}
.save:hover{transform:translateY(-2px);box-shadow:0 20px 44px -14px rgba(224,234,230,.42);}
.save:active{transform:translateY(0);}
.save svg{width:18px;height:18px;}
.save.done{background:var(--accent);color:var(--night);}

/* QUICK CONTACTS */
.quick{display:flex;flex-direction:column;gap:10px;margin-bottom:36px;}
.qbtn{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:14px;
  background:rgba(224,234,230,0.04);
  border:1px solid var(--line);
  text-decoration:none;color:var(--txt);
  transition:background .25s,border-color .25s,transform .25s;
}
.qbtn:hover{background:rgba(224,234,230,0.08);border-color:var(--line-strong);}
.qbtn:active{transform:scale(0.98);}
.qbtn .ico{
  width:38px;height:38px;flex:0 0 auto;border-radius:10px;
  background:rgba(224,234,230,0.06);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
}
.qbtn .ico svg{width:18px;height:18px;}
.qbtn.wa .ico{background:rgba(37,211,102,.14);color:#5fc885;}
.qbtn .meta{flex:1;min-width:0;}
.qbtn .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--txt-faint);font-weight:400;margin-bottom:2px;}
.qbtn .val{font-size:15px;color:var(--txt);font-weight:300;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qbtn .chev{flex:0 0 auto;color:var(--txt-faint);transition:transform .25s,color .25s;}
.qbtn:hover .chev{transform:translateX(3px);color:var(--accent);}

/* QR */
.qr-section{
  margin-top:auto;padding-top:36px;border-top:1px solid var(--line);
  text-align:center;
}
.qr-section .qr-title{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:400;margin-bottom:6px;}
.qr-section .qr-sub{font-size:13.5px;color:var(--txt-dim);font-weight:300;margin-bottom:22px;max-width:300px;margin-left:auto;margin-right:auto;line-height:1.5;}
.qr-box{
  display:inline-block;padding:18px;background:var(--fog);border-radius:18px;
  box-shadow:0 18px 50px -18px rgba(0,0,0,.55);
}
.qr-box svg{display:block;width:160px;height:160px;}
.qr-box svg path{fill:var(--night);}

/* FOOTER */
.brand-foot{margin-top:38px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.brand-foot .wm{width:96px;height:auto;opacity:.78;display:block;}
.brand-foot .tag{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--txt-faint);font-weight:300;}
.foot{margin-top:32px;text-align:center;font-size:12px;color:var(--txt-faint);letter-spacing:.05em;font-weight:300;}
.foot a{color:var(--txt-dim);text-decoration:none;}
.foot a:hover{color:var(--fog);}
.foot .dot{margin:0 8px;color:var(--txt-faint);}

/* TOAST (saved confirmation) */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);
  background:var(--accent);color:var(--night);
  padding:12px 22px;border-radius:30px;
  font-size:14px;font-weight:400;letter-spacing:.01em;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 18px 50px -12px rgba(168,198,192,.4);
  transition:transform .4s cubic-bezier(.2,.8,.2,1),opacity .3s;
  z-index:50;opacity:0;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast svg{width:16px;height:16px;}

/* Animations */
.fade-in{opacity:0;transform:translateY(14px);animation:fadeUp .8s cubic-bezier(.2,.7,.2,1) forwards;}
.fade-in:nth-child(1){animation-delay:.05s;}
.fade-in:nth-child(2){animation-delay:.12s;}
.fade-in:nth-child(3){animation-delay:.19s;}
.fade-in:nth-child(4){animation-delay:.26s;}
.fade-in:nth-child(5){animation-delay:.33s;}
@keyframes fadeUp{to{opacity:1;transform:none;}}

@media(min-width:480px){
  .card{padding:64px 40px 56px;}
}
</style>

  phone: "+523315280377",

  email: "jorge.vega@capitia.mx",

};

function buildVCard(c){
  return [
    "BEGIN:VCARD",
    "VERSION:3.0",
    `N:${c.lastName};${c.firstName};;;`,
    `FN:${c.fullName}`,
    `ORG:${c.org}`,
    `TITLE:${c.title}`,
    `TEL;TYPE=CELL,VOICE:${c.phone}`,
    `EMAIL;TYPE=INTERNET,WORK:${c.email}`,
    `URL:${c.url}`,
    `TEL;TYPE=WORK,VOICE:${c.whatsappCo}`,
    `URL:${c.linkedin}`,
    `URL:${c.instagram}`,
    `URL:${c.facebook}`,
    "END:VCARD"
  ].join("\r\n");
}

function saveContact(){
  const vcf = buildVCard(contact);
  const blob = new Blob([vcf], {type:"text/vcard;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${contact.fullName.replace(/ /g,"_")}.vcf`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 500);

  const btn = document.getElementById("saveBtn");
  const lbl = document.getElementById("saveLabel");
  btn.classList.add("done");
  lbl.textContent = "Guardado ✓";

  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2600);
  setTimeout(()=>{btn.classList.remove("done");lbl.textContent="Guardar contacto";}, 3200);
}
</script>
